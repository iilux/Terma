appId: com.terma.app
productName: Terma
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build

# Fichiers embarqués dans l'app packagée
files:
  - dist/**/*
  - electron/**/*
  - package.json

# node-pty est un module natif (.node) : il DOIT être sorti de l'asar
# sinon Electron ne peut pas le charger au runtime.
asarUnpack:
  - "**/node_modules/node-pty/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  # Générée depuis build/icon.svg via `npm run icons`.
  # Sert aussi d'icône à l'installateur NSIS (installerIcon en hérite).
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
  category: public.app-category.developer-tools
  # electron-builder convertit le PNG 512px en .icns automatiquement.
  icon: build/icon.png
  # Pas de compte Apple Developer : app non signée/notarisée. Au premier
  # lancement, Gatekeeper exige clic droit → Ouvrir (documenté dans le README).
  identity: null

dmg:
  writeUpdateInfo: false
